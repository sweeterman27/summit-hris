<style>
  /* ================================================================
     SUMMIT HRIS — Styles.html | Floating Canvas Edition
     ================================================================ */

  /* Maximalist Typography Scale */
  .text-display-hero {
    font-family: "Inter", sans-serif;
    font-size: 4rem; /* 64px */
    line-height: 1;
    letter-spacing: -2.125px;
    font-weight: 700;
    color: rgba(28, 23, 7, 0.95);
  }
  .text-section-heading {
    font-family: "Inter", sans-serif;
    font-size: 3rem; /* 48px */
    line-height: 1;
    letter-spacing: -1.5px;
    font-weight: 700;
    color: rgba(28, 23, 7, 0.95);
  }
  .text-sub-heading {
    font-family: "Inter", sans-serif;
    font-size: 1.625rem; /* 26px */
    line-height: 1.23;
    letter-spacing: -0.625px;
    font-weight: 700;
  }

  /* Whisper Borders & Elevation */
  .border-whisper {
    border: 1px solid rgba(28, 23, 7, 0.1);
  }

  .shadow-deep {
    box-shadow:
      rgba(0, 0, 0, 0.04) 0px 4px 18px,
      rgba(0, 0, 0, 0.027) 0px 2.025px 7.84688px,
      rgba(0, 0, 0, 0.02) 0px 0.8px 2.925px,
      rgba(0, 0, 0, 0.01) 0px 0.175px 1.04062px;
  }

  /* --- Premium Custom Scrollbar --- */
  .custom-scrollbar-white::-webkit-scrollbar {
    width: 4px;
  }
  .custom-scrollbar-white::-webkit-scrollbar-track {
    background: transparent;
  }
  .custom-scrollbar-white::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 10px;
  }
  .custom-scrollbar-white::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.1);
  }

  .glass-panel {
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.08);
  }

  /* --- Responsive Drawer Logic --- */
  #main-sidebar.sidebar-active {
    left: 20px !important; /* Margin from screen edge */
    box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
  }
  #mobile-overlay.overlay-active {
    display: block !important;
    opacity: 1 !important;
  }

  /* Independent Scroll System */
  .custom-scrollbar::-webkit-scrollbar {
    width: 4px;
  }
  .custom-scrollbar::-webkit-scrollbar-track {
    background: transparent;
  }
  .custom-scrollbar::-webkit-scrollbar-thumb {
    background: rgba(28, 23, 7, 0.1);
    border-radius: 10px;
  }

  /* Base Reset */
  * {
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
  }
  html {
    -moz-osx-font-smoothing: grayscale;
  }
  body {
    background: #ffffff;
    color: #1c1707;
    font-family: "Inter", sans-serif;
  }

  /* --- Typography Primitives --- */

  .t-display {
    font-family: "DM Serif Display", serif;
    font-size: 4.5rem;
    line-height: 1;
    letter-spacing: -0.08em;
    font-weight: 400;
    color: #1c1707;
  }
  .t-display2 {
    font-family: "DM Serif Display", serif;
    font-size: 3.75rem;
    line-height: 1;
    letter-spacing: -0.07em;
    font-weight: 400;
    color: #1c1707;
  }
  .t-h1 {
    font-family: "Inter", sans-serif;
    font-size: 3rem;
    line-height: 1;
    letter-spacing: -1.5px;
    font-weight: 700;
    color: #1c1707;
  }
  .t-h2 {
    font-family: "Inter", sans-serif;
    font-size: 2rem;
    line-height: 1.2;
    letter-spacing: -0.625px;
    font-weight: 700;
    color: #1c1707;
  }
  .t-h3 {
    font-family: "Inter", sans-serif;
    font-size: 1.5rem;
    line-height: 1.3;
    letter-spacing: -0.25px;
    font-weight: 700;
    color: #1c1707;
  }
  .t-lead {
    font-family: "Inter", sans-serif;
    font-size: 1.25rem;
    line-height: 1.4;
    font-weight: 600;
    letter-spacing: -0.125px;
    color: #796120;
  }
  .t-body {
    font-family: "Inter", sans-serif;
    font-size: 1rem;
    line-height: 1.5;
    font-weight: 400;
    color: #1c1707;
  }
  .t-label {
    font-family: "Inter", sans-serif;
    font-size: 0.875rem;
    line-height: 1.4;
    letter-spacing: 0.02em;
    font-weight: 600;
    text-transform: uppercase;
    color: #796120;
  }
  .t-micro {
    font-family: "Inter", sans-serif;
    font-size: 0.75rem;
    line-height: 1.33;
    letter-spacing: 0.125px;
    font-weight: 600;
    text-transform: uppercase;
    color: #796120;
  }

  /* --- Core Cards — Notion Refinement --- */
  .c-card {
    background: linear-gradient(165deg, #1c1707 0%, #2a240e 100%);
    border-radius: 2.5rem;
    padding: 32px;
    box-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.5);
    transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    overflow: hidden;
    color: white;
  }
  .c-card::before {
    content: "";
    position: absolute;
    z-index: -1;
    top: -24px;
    right: -24px;
    background: #c9a236;
    height: 48px;
    width: 48px;
    border-radius: 48px;
    transform: scale(1);
    transform-origin: 50% 50%;
    transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .c-card:hover {
    color: #ffffff !important;
  }
  .c-card:hover::before {
    transform: scale(25);
  }
  .c-card:hover .stat-number,
  .c-card:hover .t-label,
  .c-card:hover p,
  .c-card:hover span {
    color: #ffffff !important;
    transition: color 0.3s ease;
  }
  .c-card-em {
    background: linear-gradient(165deg, #1c1707 0%, #2a240e 100%);
    border-radius: 2.5rem;
    padding: 32px;
    box-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.5);
    color: white;
  }
  .c-card-dark {
    background: linear-gradient(165deg, #121008 0%, #1c1707 100%);
    border-radius: 2.5rem;
    padding: 32px;
    box-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.6);
    color: white;
  }

  /* --- Buttons --- */

  .btn-ghost {
    background: transparent;
    color: #1c1707;
    border: none;
    padding: 10px 20px;
    font-family: "Inter", sans-serif;
    font-size: 0.9375rem;
    font-weight: 600;
    cursor: pointer;
    transition:
      color 0.15s ease,
      background 0.15s ease;
    text-decoration: none;
    display: inline-block;
    border-radius: 4px;
  }
  .btn-ghost:hover {
    color: #c9a236;
    background: rgba(0, 0, 0, 0.03);
  }
  .btn-ghost:focus-visible {
    outline: 2px solid #c9a236;
    outline-offset: 2px;
  }

  .btn-solid {
    background: #c9a236;
    color: #ffffff;
    border: none;
    padding: 10px 24px;
    font-family: "Inter", sans-serif;
    font-size: 0.9375rem;
    font-weight: 600;
    border-radius: 4px;
    cursor: pointer;
    transition:
      background 0.15s ease,
      transform 0.1s ease;
    display: inline-block;
    text-decoration: none;
  }
  .btn-solid:hover {
    background: #a1822b;
  }
  .btn-solid:active {
    transform: scale(0.95);
  }
  .btn-solid:focus-visible {
    outline: 2px solid #c9a236;
    outline-offset: 2px;
  }

  .btn-outline {
    background: transparent;
    color: #1c1707;
    border: 1px solid rgba(28, 23, 7, 0.2);
    padding: 10px 24px;
    font-family: "Inter", sans-serif;
    font-size: 0.9375rem;
    font-weight: 600;
    border-radius: 4px;
    cursor: pointer;
    transition:
      border-color 0.15s ease,
      color 0.15s ease;
    display: inline-block;
  }
  .btn-outline:hover {
    border-color: #c9a236;
    color: #c9a236;
  }
  .btn-outline:focus-visible {
    outline: 2px solid #1863dc;
    outline-offset: 2px;
  }

  /* Small button variant */
  .btn-sm {
    padding: 6px 16px;
    font-size: 0.875rem;
    font-weight: 500;
  }

  /* Hero / Glass Variant for dark backgrounds */
  .btn-glass {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: #ffffff;
    border: 1px solid rgba(255, 255, 255, 0.3);
    padding: 10px 24px;
    font-family: "Inter", sans-serif;
    font-size: 0.9375rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .btn-glass:hover {
    background: rgba(255, 255, 255, 0.25);
    border-color: #ffffff;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    transform: translateY(-1px);
  }
  .btn-glass:active {
    transform: translateY(1px);
  }

  /* ── Summit ID Bar & Liquid Glass tokens ───────────────────── */
  .id-bar {
    position: relative;
    background: linear-gradient(165deg, #1c1707 0%, #2a240e 100%);
    border-radius: 2.5rem;
    padding: 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 20px;
    box-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.5);
    transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    overflow: hidden;
    height: 100%;
    color: white;
  }
  .id-bar:hover {
    box-shadow: 0 50px 100px -10px rgba(201, 162, 54, 0.15);
  }

  /* Identity Micro-Badges */
  .id-micro-badge {
    padding: 4px 10px;
    background: rgba(201, 162, 54, 0.1);
    color: #c9a236;
    border: 1px solid rgba(201, 162, 54, 0.3);
    border-radius: 8px;
    font-size: 0.65rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* Hover Action Layer */
  .id-actions-overlay {
    position: absolute;
    inset: 0;
    background: rgba(28, 23, 7, 0.95);
    backdrop-filter: blur(12px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s ease;
    transform: translateY(10px);
    z-index: 20;
  }
  .id-bar:hover .id-actions-overlay {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
  }

  .avatar-portal {
    position: relative;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 4px solid #ca8a04; 
    padding: 4px;
    background: #fff;
    cursor: pointer;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(202, 138, 4, 0.2);
  }
  .avatar-portal img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    transition: filter 0.3s;
  }
  .avatar-portal:hover img {
    filter: brightness(0.7);
  }
  .avatar-portal .upload-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.3s;
    color: #fff;
    background: rgba(0,0,0,0.4);
  }
  .avatar-portal:hover .upload-overlay {
    opacity: 1;
  }
  .status-badge {
    padding: 4px 12px;
    border-radius: 100px;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .status-on {
    background: #ecfdf5;
    color: #059669;
    box-shadow: 0 0 15px rgba(5, 150, 105, 0.1);
  }
  .status-on::before {
    content: '';
    width: 6px; height: 6px;
    background: #059669;
    border-radius: 50%;
    animation: pulse-green 2s infinite;
  }
  .status-off {
    background: #fff7ed;
    color: #d97706;
  }
  .status-off::before {
    content: '';
    width: 6px; height: 6px;
    background: #d97706;
    border-radius: 50%;
  }

  @keyframes pulse-green {
    0% { box-shadow: 0 0 0 0 rgba(5, 150, 105, 0.4); }
    70% { box-shadow: 0 0 0 8px rgba(5, 150, 105, 0); }
    100% { box-shadow: 0 0 0 0 rgba(5, 150, 105, 0); }
  }

  /* --- Inputs --- */
  .c-input {
    width: 100%;
    background: #ffffff;
    border: 1px solid #d9d9dd;
    border-radius: 8px;
    padding: 12px 16px;
    font-family: "Inter", sans-serif;
    font-size: 1rem;
    font-weight: 400;
    color: #000000;
    outline: none;
    transition:
      border-color 0.15s ease,
      box-shadow 0.15s ease;
  }
  .c-input::placeholder {
    color: #93939f;
  }
  .c-input:focus {
    border-color: #c9a236;
    box-shadow: 0 0 0 4px rgba(201, 162, 54, 0.08);
  }
  .c-input:focus-visible {
    outline: none;
  }

  /* --- Premium Nav Sidebar --- */
  /* --- Legacy Sidebar Effects Removed --- */

  .nav-item {
    display: flex;
    align-items: center;
    padding: 12px 24px;
    min-height: 48px;
    color: #1c1707;
    text-decoration: none;
    transition: all 0.2s ease;
    cursor: pointer;
    border: none;
    background: transparent;
    width: 100%;
    border-radius: 0;
  }
  .nav-item svg {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
  }
  .nav-item:hover {
    background: rgba(201, 162, 54, 0.08);
    color: #c9a236;
  }
  .nav-item.active {
    background: #faf6eb;
    color: #c9a236;
    border-left: 4px solid #c9a236;
  }

  /* --- Password Toggle --- */
  .pw-container {
    position: relative;
    width: 100%;
  }
  .toggle-pw {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    padding: 6px;
    cursor: pointer;
    color: #796120;
    display: flex;
    align-items: center;
    justify-content: center;
    transition:
      color 0.2s ease,
      opacity 0.2s ease;
    z-index: 10;
  }
  .toggle-pw:hover {
    color: #c9a236;
    opacity: 0.8;
  }
  .toggle-pw svg {
    width: 18px;
    height: 18px;
    pointer-events: none;
  }

  /* --- Notifications & Badges --- */
  .notif-badge {
    position: absolute;
    top: -4px;
    right: -4px;
    background: #c9a236;
    color: #fff;
    font-size: 0.65rem;
    font-weight: 700;
    min-width: 16px;
    height: 16px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid #fff;
    box-shadow: 0 0 8px rgba(201, 162, 54, 0.4);
    pointer-events: none;
  }
  .bg-pulse {
    animation: pulse 2s infinite;
  }

  /* ── Calendar Grid ────────────────────────────────────────── */
  .calendar-container {
    background: #ffffff;
    border: 1px solid rgba(201, 162, 54, 0.15);
    border-radius: 24px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 750px;
    box-shadow:
      0 4px 24px -2px rgba(201, 162, 54, 0.05),
      0 12px 48px -12px rgba(201, 162, 54, 0.1);
  }

  .calendar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 32px;
    border-bottom: 1px solid rgba(201, 162, 54, 0.1);
  }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    flex: 1;
  }

  .calendar-day-label {
    padding: 12px;
    text-align: center;
    font-size: 0.75rem;
    font-weight: 600;
    color: #796120;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    border-bottom: 1px solid rgba(201, 162, 54, 0.1);
    background: #fafafa;
  }

  .calendar-cell {
    min-height: 120px;
    padding: 16px;
    border-right: 1px solid rgba(201, 162, 54, 0.08);
    border-bottom: 1px solid rgba(201, 162, 54, 0.08);
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow-y: auto;
    background: white;
  }

  .calendar-cell:nth-child(7n) {
    border-right: none;
  }

  .calendar-cell:hover:not(.other-month) {
    background: rgba(201, 162, 54, 0.02);
    border-color: rgba(201, 162, 54, 0.3) !important;
    transform: translateZ(0);
    z-index: 10;
  }

  .calendar-cell.active {
    background: rgba(201, 162, 54, 0.04);
    box-shadow:
      inset 0 0 0 2px #c9a236,
      0 8px 30px rgba(201, 162, 54, 0.12);
    z-index: 20;
    border-color: transparent !important;
  }

  .calendar-cell.today {
    background: rgba(201, 162, 54, 0.08);
    border: 2px solid #c9a236 !important;
    box-shadow: 0 4px 20px rgba(201, 162, 54, 0.15);
    z-index: 15;
  }

  .calendar-cell.today .day-num {
    color: #c9a236;
    font-weight: 800;
  }

  .day-num {
    font-size: 0.8125rem;
    font-weight: 600;
    color: #44403c;
    margin-bottom: 12px;
    display: block;
    transition: color 0.3s;
  }

  .events-container {
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow-y: auto;
    max-height: 90px;
  }

  .calendar-event {
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    border-left: 3px solid transparent;
    font-weight: 600;
    background: rgba(255, 255, 255, 0.95);
    border: 1px solid rgba(201, 162, 54, 0.1);
    color: #1c1917;
  }

  .calendar-event:hover {
    transform: translateX(4px);
    box-shadow: 4px 0 15px rgba(201, 162, 54, 0.12);
    border-color: rgba(201, 162, 54, 0.4);
  }

  .event-shift {
    border-left: 3px solid #44403c;
    background: #fbfbfb;
  }
  .event-corporate {
    border-left: 3px solid #c9a236;
  }

  .calendar-cell::-webkit-scrollbar {
    width: 4px;
  }
  .calendar-cell::-webkit-scrollbar-thumb {
    background: rgba(201, 162, 54, 0.15);
    border-radius: 10px;
  }

  @keyframes gold-pulse {
    0% {
      box-shadow: 0 0 0 0 rgba(201, 162, 54, 0.5);
    }
    70% {
      box-shadow: 0 0 0 10px rgba(201, 162, 54, 0);
    }
    100% {
      box-shadow: 0 0 0 0 rgba(201, 162, 54, 0);
    }
  }

  .notif-panel {
    position: absolute;
    top: 60px;
    right: 40px;
    width: 320px;
    max-height: 480px;
    background: #ffffff;
    border: 1px solid rgba(28, 23, 7, 0.1);
    border-radius: 12px;
    box-shadow: 0 12px 48px rgba(0, 0, 0, 0.12);
    z-index: 1000;
    display: none;
    flex-direction: column;
    overflow: hidden;
    animation: slide-down 0.2s ease-out;
  }
  @keyframes slide-down {
    from {
      opacity: 0;
      transform: translateY(-10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .notif-item {
    padding: 16px 20px;
    border-bottom: 1px solid rgba(28, 23, 7, 0.05);
    cursor: pointer;
    transition: background 0.2s ease;
    position: relative;
    display: block;
    text-decoration: none;
  }
  .notif-item:hover {
    background: #faf6eb;
  }
  .notif-item.unread {
    background: rgba(201, 162, 54, 0.03);
  }
  .notif-item.unread::after {
    content: "";
    position: absolute;
    left: 8px;
    top: 22px;
    width: 6px;
    height: 6px;
    background: #c9a236;
    border-radius: 50%;
  }

  .tier-pill {
    font-size: 0.55rem;
    padding: 2px 8px;
    border-radius: 6px;
    text-transform: uppercase;
    font-weight: 800;
    letter-spacing: 0.1em;
    display: inline-block;
  }
  .tier-1 { background: #fef2f2; color: #dc2626; border: 1px solid #fee2e2; } /* Action-Required */
  .tier-SYSTEM { background: #f1f5f9; color: #475569; }
  .tier-SUPPORT { background: #fffbeb; color: #b45309; border: 1px solid #fef3c7; }
  .tier-2 { background: #f0fdf4; color: #15803d; }

  .notif-panel-tailwind {
    display: flex;
    flex-direction: column;
    z-index: 250;
    top: 100%;
    right: 0;
    min-width: 320px;
    transform-origin: top right;
  }

  .notif-remove-btn {
    opacity: 0;
    padding: 4px;
    border-radius: 6px;
    color: #94a3b8;
    transition: all 0.2s ease;
    cursor: pointer;
    border: none;
    background: transparent;
  }

  .notif-item:hover .notif-remove-btn {
    opacity: 1;
  }

  .notif-remove-btn:hover {
    background: #fee2e2;
    color: #ef4444;
  }

  /* --- Gold Hero Band --- */
  .hero-band {
    background: linear-gradient(135deg, #28200b 0%, #514115 30%, #796120 100%);
